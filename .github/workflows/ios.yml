name: iOS CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and Test
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: List available simulators
        run: xcrun simctl list devices

      - name: Build and Test
        run: |
          xcodebuild -project NewsDigest.xcodeproj \
                     -scheme NewsDigest \
                     -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
                     -clonedSourcePackagesDirPath ./DerivedData \
                     clean build
